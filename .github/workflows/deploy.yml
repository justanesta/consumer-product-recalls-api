name: Deploy

# Deploy to Fly.io only after CI succeeds on main (workflow_run gates the deploy on the green gate).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # deploy exactly the commit CI passed
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Fly deploy
        run: flyctl deploy --remote-only --build-arg GIT_SHA="${{ github.event.workflow_run.head_sha }}"
        env:
          # Set in repo environment settings settings: "Environments → production → Secrets" -> FLY_API_TOKEN.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Post-deploy readiness smoke
        # TODO(operator): point at your Fly app hostname. Retries cover a cold-Neon wake (503 -> 200).
        run: |
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error "https://consumer-product-recalls-api.fly.dev/health/db"; then
              echo "readiness ok"; exit 0
            fi
            echo "attempt $i not ready; retry in 10s"; sleep 10
          done
          echo "post-deploy readiness check failed"; exit 1
