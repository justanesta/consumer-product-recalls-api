name: Deploy

# Deploy to Fly.io only after CI succeeds on main (workflow_run gates the deploy on the green gate).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fly deploy
        run: flyctl deploy --remote-only
        env:
          # Set in repo settings: Secrets and variables -> Actions -> FLY_API_TOKEN.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
