name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Integration tests run against this throwaway Postgres (via TEST_DATABASE_URL, so the conftest
    # uses it instead of spinning a testcontainer). The unit + contract tests need no DB.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright

      - name: Tests (unit + integration + contract, coverage >= 85)
        run: uv run pytest --cov-fail-under=85

      - name: OpenAPI snapshot drift
        run: uv run python -m recalls_api.export_openapi --check

      - name: Pre-commit (all hooks — gitleaks, uv.lock, etc.)
        run: uv run pre-commit run --all-files
